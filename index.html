<style>

  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;}
  #app{display:flex;flex-direction:column;height:100vh;}
  header{padding:12px 18px;border-bottom:1px solid var(--line);background:var(--panel);}
  header h1{font-size:16px;margin:0;font-weight:600;}
  header .sub{color:var(--muted);font-size:12.5px;margin-top:2px;}
  #map{flex:1;}
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);border-radius:10px;}
  .leaflet-popup-tip{background:var(--panel);}
  .leaflet-popup-content{margin:12px 14px;max-height:340px;overflow-y:auto;}
  .popup{width:280px;}
  .popup h3{margin:0 0 8px;font-size:14.5px;color:var(--accent);border-bottom:1px solid var(--line);padding-bottom:6px;}
  .popup .row{font-size:12px;margin:5px 0;line-height:1.45;}
  .popup b{color:var(--accent2);display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px;}
  .popup a{color:var(--accent2);}
  #legend{position:absolute;bottom:16px;left:16px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--muted);z-index:500;max-width:300px;}
  .num-badge{background:var(--accent);color:#20180a;font-weight:700;font-size:9px;border-radius:5px;padding:1px 4px;white-space:nowrap;border:1.5px solid #7a5c14;box-shadow:0 1px 3px rgba(0,0,0,.5);transform:translate(-50%,-130%);font-family:'Consolas',monospace;}
</style>

const map = L.map('map', {zoomControl:true}).setView([50.2,7.5], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 18
}).addTo(map);

let markersLayer = L.layerGroup().addTo(map);

function esc(s){ return (s||'—'); }

function renderMarkers(list){
  markersLayer.clearLayers();
  list.forEach(v=>{
    if(!v.coords) return;
    const dot = L.circleMarker(v.coords, {radius:6, color:"#e8b64c", weight:2, fillColor:"#e8b64c", fillOpacity:0.9}).addTo(markersLayer);
    const numIcon = L.divIcon({className:'', html:`<div class="num-badge">${v.number}</div>`, iconSize:[0,0]});
    L.marker(v.coords, {icon:numIcon, interactive:false}).addTo(markersLayer);

    const popupHtml = `
      <div class="popup">
        <h3>${esc(v.city)}</h3>
        <div class="row"><b>Номер</b>${esc(v.number)}</div>
        <div class="row"><b>Город</b>${esc(v.city)}</div>
        <div class="row"><b>Специальность</b>${esc(v.spec)}</div>
        <div class="row"><b>Оплата чистыми</b>${esc(v.pay)}</div>
        <div class="row"><b>Для кого</b>${esc(v.for_whom)}</div>
        <div class="row"><b>Опыт</b>${esc(v.experience)}</div>
        <div class="row"><b>График работы</b>${esc(v.schedule)}</div>
        <div class="row"><b>Жилье</b>${esc(v.housing)}</div>
        <div class="row"><b>Трансфер на работу</b>${esc(v.transfer)}</div>
        <div class="row"><b>Знание языка</b>${esc(v.language)}</div>
        <div class="row" style="margin-top:8px;"><a href="${v.link}" target="_blank">Відкрити пост →</a></div>
      </div>`;
    dot.bindTooltip(`<b>№ ${v.number}</b><br>${v.city}<br>${(v.spec||'').slice(0,60)}`, {direction:'top', sticky:true});
    dot.bindPopup(popupHtml, {maxWidth:300});
  });
}

renderMarkers(VACANCIES);

  const div = L.DomUtil.create('div','');
  div.id = 'legend';
  div.innerHTML = `Мітки — вакансії зі списків за сьогодні, місто підтверджено з повної картки (${VACANCIES.length} шт.).<br>
  У попапі — повні дані поста: номер, місто, спеціальність, оплата, для кого, досвід, графік, житло, трансфер, мова.`;
  return div;
};
legend.addTo(map);

document.getElementById('lastUpdated').textContent =
  "Дані станом на: " + new Date().toLocaleString('uk-UA') + " · вакансій: " + VACANCIES.length;
</script>
